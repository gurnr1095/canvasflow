services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────
  - type: web
    name: canvasflow-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # paste your Neon connection string here
      - key: CLERK_JWKS_URL
        sync: false          # set manually in Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false          # set to your Render static site URL after first deploy

  # ── Frontend (Vite/React static site) ─────────────────────────────
  - type: web
    name: canvasflow-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # required for React Router
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false          # your Clerk publishable key (pk_test_... or pk_live_...)
      - key: VITE_API_URL
        sync: false          # your Render backend URL, e.g. https://canvasflow-backend.onrender.com
